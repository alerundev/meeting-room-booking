<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>회의실 예약</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">

    <!-- Header -->
    <header class="app-header">
      <div class="header-inner">
        <div class="brand">
          <div class="brand-text">
            <h1>회의실 예약</h1>
            <span class="today-date" id="today-date"></span>
          </div>
        </div>
      </div>
    </header>

    <!-- 예약 폼 -->
    <section class="booking-section">
      <h2 class="section-title">새 예약</h2>
      <form id="reservation-form" class="booking-form">
        <div class="form-group">
          <label for="input-name">예약자</label>
          <input type="text" id="input-name" placeholder="이름을 입력하세요" required />
        </div>

        <div class="form-group">
          <label>회의실</label>
          <div class="room-pills" id="room-pills"></div>
        </div>

        <div class="form-group form-group-date">
          <label for="input-date">날짜</label>
          <input type="date" id="input-date" required />
        </div>

        <div class="form-group form-group-time">
          <label>시간</label>
          <div class="time-select-row">
            <select id="input-start" required></select>
            <span class="time-divider">—</span>
            <select id="input-end" required></select>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">예약하기</button>
        </div>
      </form>

      <div class="form-message" id="form-message"></div>
    </section>

    <!-- 타임테이블 -->
    <section class="timetable-section">
      <h2 class="section-title">오늘 예약 현황</h2>
      <div class="timetable-rooms" id="timetable-container"></div>
    </section>

  </div>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
